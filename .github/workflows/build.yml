name: build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # UI deps installed up front so MSBuild's BuildUi target sees
      # ui/node_modules already exists and skips its own `npm install --prefix`
      # (which intermittently fails with -4058/ENOENT on windows-latest when
      # invoked through MSBuild Exec, typically during esbuild's postinstall).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Terminal.sln

      - name: Build
        run: dotnet build Terminal.sln --no-restore --configuration Debug

      - name: Test
        run: dotnet test Terminal.sln --no-build --configuration Debug --verbosity normal
