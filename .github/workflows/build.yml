name: build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Terminal.sln

      - name: Build
        run: dotnet build Terminal.sln --no-restore --configuration Debug

      - name: Test
        run: dotnet test Terminal.sln --no-build --configuration Debug --verbosity normal
