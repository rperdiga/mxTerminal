<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <style>
    /* ─── Theme variables ─── */
    body.theme-dark {
      --bg:           #1e1e1e;
      --bg-strip:     #252526;
      --bg-hover:     #2d2d30;
      --border:       #3e3e42;
      --fg:           #d4d4d4;
      --fg-muted:     #888;
      --accent:       #0e639c;
      --modal-bg:     #252526;
      --input-bg:     #1e1e1e;
      --button-fg:    #fff;
      --button-second:#3e3e42;
      --overlay:      rgba(0,0,0,0.5);
    }
    body.theme-light {
      --bg:           #ffffff;
      --bg-strip:     #f3f3f3;
      --bg-hover:     #e8e8e8;
      --border:       #cccccc;
      --fg:           #1f1f1f;
      --fg-muted:     #666;
      --accent:       #0e639c;
      --modal-bg:     #f8f8f8;
      --input-bg:     #ffffff;
      --button-fg:    #fff;
      --button-second:#cccccc;
      --overlay:      rgba(0,0,0,0.35);
    }

    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #tab-strip { display: flex; align-items: center; background: var(--bg-strip); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 32px; }
    #tabs { display: flex; align-items: stretch; min-width: 0; overflow-x: auto; }
    #tabs::-webkit-scrollbar { height: 0; }
    .tab { padding: 6px 12px; cursor: pointer; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 6px; white-space: nowrap; user-select: none; flex-shrink: 0; }
    .tab.active { background: var(--bg); border-bottom: 2px solid var(--accent); }
    .tab-title { font-size: 12px; }
    .tab-close { color: var(--fg-muted); padding: 0 4px; border-radius: 2px; }
    .tab-close:hover { background: var(--border); color: var(--fg); }
    .tab-new, .tab-settings { padding: 6px 10px; cursor: pointer; color: var(--fg-muted); }
    .tab-new:hover, .tab-settings:hover { color: var(--fg); background: var(--bg-hover); }
    .tab-settings { font-size: 17px; line-height: 1; padding: 6px 12px; }
    #terminals { flex: 1; min-height: 0; position: relative; }
    .terminal-host { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
    .terminal-host.active { display: block; }
    #settings-modal { position: fixed; inset: 0; background: var(--overlay); display: none; align-items: center; justify-content: center; z-index: 100; }
    #settings-modal.visible { display: flex; }
    .modal { background: var(--modal-bg); padding: 24px; border-radius: 6px; min-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    .modal h3 { margin: 0 0 16px; color: var(--fg); }
    .modal h4 { margin: 18px 0 10px; color: var(--fg); font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.75; border-top: 1px solid var(--border); padding-top: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: var(--fg-muted); margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 6px 8px; background: var(--input-bg); color: var(--fg); border: 1px solid var(--border); border-radius: 3px; box-sizing: border-box; font-family: inherit; font-size: 13px; }
    .field-hidden { display: none; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; color: var(--fg); }
    .checkbox-row input[type=checkbox] { width: auto; margin: 0; }
    .checkbox-row.indent { padding-left: 20px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .actions button { padding: 6px 14px; background: var(--accent); color: var(--button-fg); border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .actions button.secondary { background: var(--button-second); color: var(--fg); }
    /* Inline notification banner shown after MCP save. Fades in just below
       the tab strip; auto-hides or user-dismissible. */
    #banner {
      position: absolute;
      top: 32px; left: 0; right: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      font-size: 12.5px; line-height: 1.4;
      border-bottom: 1px solid var(--border);
      background: var(--bg-strip);
      color: var(--fg);
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.18s ease-out, visibility 0.18s ease-out;
      z-index: 50;
      pointer-events: none;
    }
    #banner.visible { visibility: visible; opacity: 1; pointer-events: auto; }
    #banner .banner-icon {
      flex-shrink: 0;
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 11px; font-weight: 700;
      color: #fff;
    }
    #banner.ok  .banner-icon { background: #2ea043; }   /* GitHub-ish green  */
    #banner.err .banner-icon { background: #cf222e; }   /* GitHub-ish red    */
    #banner .banner-message { flex: 1; }
    #banner .banner-close {
      flex-shrink: 0;
      cursor: pointer;
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      color: var(--fg-muted);
      font-size: 14px;
      user-select: none;
    }
    #banner .banner-close:hover { background: var(--bg-hover); color: var(--fg); }
  </style>
</head>
<body class="theme-dark">
  <div id="app">
    <div id="tab-strip">
      <div id="tabs"></div>
      <div class="tab-new" id="btn-new" title="New tab">+</div>
      <div style="flex:1"></div>
      <div class="tab-settings" id="btn-settings" title="Settings">⚙</div>
    </div>
    <div id="terminals"></div>
  </div>
  <div id="banner">
    <span class="banner-icon" id="banner-icon"></span>
    <span class="banner-message" id="banner-message"></span>
    <span class="banner-close" id="banner-close" title="Dismiss">×</span>
  </div>
  <div id="settings-modal">
    <div class="modal">
      <h3>Terminal settings</h3>
      <div class="field">
        <label>Shell</label>
        <select id="set-shell-select"></select>
      </div>
      <div class="field" id="set-shell-custom-row">
        <label>Shell path</label>
        <input id="set-shell" type="text">
      </div>
      <div class="field"><label>Args (space-separated)</label><input id="set-args" type="text"></div>
      <div class="field">
        <label>Theme</label>
        <select id="set-theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="field"><label>Ring buffer (KB)</label><input id="set-ring" type="number" min="64"></div>
      <div class="field"><label>xterm scrollback (lines)</label><input id="set-scroll" type="number" min="100"></div>

      <h4>MCP Server</h4>
      <div class="checkbox-row">
        <input id="set-mcp-enabled" type="checkbox">
        <label for="set-mcp-enabled" style="margin:0">Enable Studio Pro MCP server integration</label>
      </div>
      <div class="field"><label>Port</label><input id="set-mcp-port" type="number" min="1" max="65535" value="7782"></div>
      <div class="checkbox-row indent"><input id="set-mcp-claude" type="checkbox"><label for="set-mcp-claude" style="margin:0">Claude Code (writes <code>.mcp.json</code>)</label></div>
      <div class="checkbox-row indent"><input id="set-mcp-copilot" type="checkbox"><label for="set-mcp-copilot" style="margin:0">GitHub Copilot CLI (shares <code>.mcp.json</code>)</label></div>
      <div class="checkbox-row indent"><input id="set-mcp-codex" type="checkbox"><label for="set-mcp-codex" style="margin:0">Codex (writes <code>~/.codex/config.toml</code> via <code>mcp-remote</code>)</label></div>

      <div class="actions">
        <button class="secondary" id="set-cancel">Cancel</button>
        <button id="set-save">Save</button>
      </div>
    </div>
  </div>
  <script src="terminal.bundle.js"></script>
</body>
</html>
