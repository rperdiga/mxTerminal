<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blue gradient: Mendix light-mode blue → dark-mode blue, top-left warm, bottom-right deep -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C6EC4"/>
      <stop offset="100%" stop-color="#1A4D8A"/>
    </linearGradient>

    <!-- Subtle inner glow on the prompt glyphs -->
    <filter id="glyphGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to the rounded square shape -->
    <clipPath id="containerClip">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- ── Container: rounded square with blue gradient fill ── -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- ── Dark terminal surface (inset panel, slightly rounded) ── -->
  <rect x="48" y="48" width="416" height="320" rx="20" ry="20" fill="#1E1E1E" opacity="0.55"/>

  <!-- ── Top bar: three traffic-light dots (macOS/terminal chrome) ── -->
  <circle cx="90"  cy="82" r="10" fill="#FF5F57" opacity="0.85"/>
  <circle cx="122" cy="82" r="10" fill="#FEBC2E" opacity="0.85"/>
  <circle cx="154" cy="82" r="10" fill="#27C840" opacity="0.85"/>

  <!-- Thin separator line below the traffic lights -->
  <line x1="48" y1="105" x2="464" y2="105" stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>

  <!-- ── Prompt glyphs: >_ centered, Cascadia Mono weight ── -->
  <!--
    We draw the glyphs as pure geometry so they render identically at every size
    and don't rely on font availability in the SVG renderer.

    ">" chevron: two strokes forming a rightward arrow at 56° angle
    "_" underbar: a simple horizontal rect (the cursor underline)

    Grid: glyph zone = x:88..424, y:128..336 (8-grid aligned)
    Chevron center: x=196, y=232  |  Underbar center: x=346, y=288
  -->

  <!-- Chevron ">" — two thick strokes meeting at a right-pointing apex -->
  <!-- Top arm: from (96,152) to apex (220,232) -->
  <line x1="96" y1="148" x2="224" y2="232" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  <!-- Bottom arm: from apex (220,232) to (96,316) -->
  <line x1="224" y1="232" x2="96" y2="316" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>

  <!-- Cursor bar "_" — wide underline representing the blinking cursor -->
  <!-- Positioned to the right of the chevron, baseline-aligned -->
  <rect x="264" y="282" width="160" height="36" rx="8" ry="8" fill="#FFFFFF"/>

  <!-- Blinking cursor vertical bar (blue, sits just after the underbar to suggest active input) -->
  <rect x="264" y="148" width="20" height="120" rx="4" ry="4" fill="#4476B7" opacity="0.9"/>

  <!-- ── Wordmark area: "CONCORD" in monospace terminal style below the panel ── -->
  <!--
    Because font rendering is environment-dependent, we draw the wordmark
    as a simple text element with a web-safe monospace fallback. At icon
    sizes it won't be legible anyway — the shape carries the mark.
    The thumbnail SVG (rasterized separately) uses the full layout.
  -->
  <text
    x="256"
    y="436"
    font-family="'Cascadia Mono', 'Consolas', 'Courier New', monospace"
    font-weight="600"
    font-size="52"
    letter-spacing="10"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="0.92"
  >CONCORD</text>

  <!-- Subtle underline accent below wordmark -->
  <rect x="128" y="452" width="256" height="3" rx="1.5" fill="#4476B7" opacity="0.7"/>
</svg>
